  <script>
    // Robust LZString fallback to prevent script failures if CDN is blocked/delayed
    if (typeof LZString === 'undefined') {
      window.LZString = {
        compressToEncodedURIComponent: function(str) {
          try {
            return btoa(encodeURIComponent(str)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
          } catch(e) { return ''; }
        },
        decompressFromEncodedURIComponent: function(str) {
          try {
            let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) { base64 += '='; }
            return decodeURIComponent(atob(base64));
          } catch(e) { return ''; }
        }
      };
    }

    // High quality, minimal interactive visual boilerplate - gentle water ripple
    // Note: Escaped internal closing script tags to prevent HTML parsing errors on parent page.
    const baseBoilerplate = `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #fafafa;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="artCanvas"></canvas>
  <script>
    const canvas = document.getElementById('artCanvas');
    const ctx = canvas.getContext('2d');
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    
    let mouse = { x: width / 2, y: height / 2, active: false };
    let ripples = [];

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    class Ripple {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 0;
        this.maxRadius = Math.random() * 80 + 40;
        this.opacity = 1;
        this.color = 'hsl(' + (Math.random() * 40 + 220) + ', 70%, 75%)';
        this.speed = Math.random() * 1.5 + 1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2 * this.opacity;
        ctx.globalAlpha = this.opacity;
        ctx.stroke();
        ctx.globalAlpha = 1.0;
      }
      update() {
        this.radius += this.speed;
        this.opacity = 1 - (this.radius / this.maxRadius);
      }
    }

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      if (Math.random() < 0.15) {
        ripples.push(new Ripple(mouse.x, mouse.y));
      }
    });

    window.addEventListener('click', (e) => {
      for (let i = 0; i < 5; i++) {
        ripples.push(new Ripple(e.clientX, e.clientY));
      }
    });

    window.addEventListener('touchmove', (e) => {
      if(e.touches.length > 0) {
        let touch = e.touches[0];
        mouse.x = touch.clientX;
        mouse.y = touch.clientY;
        if (Math.random() < 0.15) {
          ripples.push(new Ripple(mouse.x, mouse.y));
        }
      }
    });

    function animate() {
      ctx.fillStyle = 'rgba(250, 250, 250, 0.08)';
      ctx.fillRect(0, 0, width, height);

      for (let i = ripples.length - 1; i >= 0; i--) {
        ripples[i].update();
        ripples[i].draw();
        if (ripples[i].opacity <= 0) {
          ripples.splice(i, 1);
        }
      }

      ctx.beginPath();
      ctx.arc(mouse.x, mouse.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(79, 70, 229, 0.15)';
      ctx.fill();

      requestAnimationFrame(animate);
    }
    animate();
  <\/script>
</body>
</html>`;

    let playlist = [...defaultArtworks];
    let currentIndex = 0;
    let autoPlay = true;
    let timerInterval = null;
    let PLAY_DURATION = 10000; // Default 10 seconds
    let isProjectionMode = false;

    // Element References
    const playlistContainer = document.getElementById('playlist-container');
    const iframeExhibition = document.getElementById('exhibition-iframe');
    const galleryLoader = document.getElementById('gallery-loader');
    const loadingTitle = document.getElementById('loading-title');
    
    const artInfoPanel = document.getElementById('art-info-panel');
    const titleEl = document.getElementById('current-art-title');
    const authorEl = document.getElementById('current-art-author');
    const progressBar = document.getElementById('exhibition-progress');
    const selectSpeed = document.getElementById('select-speed');
    const timerDisplay = document.getElementById('timer-display');
    
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnTogglePlay = document.getElementById('btn-toggle-play');
    const iconPlayPause = document.getElementById('icon-play-pause');

    const sidebarPanel = document.getElementById('sidebar-panel');
    const sidebarBackdrop = document.getElementById('sidebar-backdrop');
    const btnMobileToggle = document.getElementById('btn-mobile-toggle');
    const btnProjectionMode = document.getElementById('btn-projection-mode');
    const btnExitProjection = document.getElementById('btn-exit-projection');
    
    const studioModal = document.getElementById('studio-modal');
    const btnOpenStudio = document.getElementById('btn-open-studio');
    const btnCloseStudio = document.getElementById('btn-close-studio');
    const codeEditor = document.getElementById('code-editor');
    const studioIframe = document.getElementById('studio-preview-iframe');
    const inputTitle = document.getElementById('input-art-title');
    const inputAuthor = document.getElementById('input-art-author');
    const fileInput = document.getElementById('file-input');
    const btnResetEditor = document.getElementById('btn-reset-editor');
    const btnGenerateShare = document.getElementById('btn-generate-share');
    const shareResult = document.getElementById('share-result');
    const shareUrlInput = document.getElementById('share-url-input');
    const btnCopyLink = document.getElementById('btn-copy-link');
    const btnAddToGallery = document.getElementById('btn-add-to-gallery');

    const touchLeft = document.getElementById('touch-area-left');
    const touchRight = document.getElementById('touch-area-right');

    // UI Toast System
    function showToast(title, message, iconType = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `bg-white/95 border border-slate-100 text-slate-800 px-4 py-2.5 rounded-lg shadow-md flex items-center gap-3 transform -translate-y-2 opacity-0 transition-all duration-200 backdrop-blur-md`;
      
      let icon = `<i class="fa-solid fa-circle-check text-indigo-500 text-xs"></i>`;
      if (iconType === 'error') icon = `<i class="fa-solid fa-circle-exclamation text-rose-500 text-xs"></i>`;
      if (iconType === 'success') icon = `<i class="fa-solid fa-wand-magic-sparkles text-emerald-500 text-xs"></i>`;

      toast.innerHTML = `${icon}<div><strong class="block text-[10px] font-bold text-slate-900">${title}</strong><span class="text-[9px] text-slate-400">${message}</span></div>`;
      container.appendChild(toast);
      
      requestAnimationFrame(() => {
        toast.classList.remove('-translate-y-2', 'opacity-0');
      });
      setTimeout(() => {
        toast.classList.add('-translate-y-2', 'opacity-0');
        setTimeout(() => toast.remove(), 250);
      }, 2500);
    }

    function renderPlaylistUI() {
      playlistContainer.innerHTML = '';
      playlist.forEach((art, index) => {
        const isActive = index === currentIndex;
        const item = document.createElement('button');
        item.className = `w-full text-left px-3.5 py-2.5 rounded-lg transition-all border flex flex-col gap-0.5 ${
          isActive 
            ? 'bg-white border-slate-100 shadow-sm' 
            : 'bg-transparent border-transparent hover:bg-slate-50'
        }`;
        
        item.innerHTML = `
          <div class="flex items-center justify-between w-full">
            <span class="text-[11px] font-bold truncate ${isActive ? 'text-indigo-600' : 'text-slate-700'}">${art.title}</span>
            ${isActive ? '<span class="w-1 h-1 rounded-full bg-indigo-500"></span>' : ''}
          </div>
          <span class="text-[9px] truncate ${isActive ? 'text-indigo-500/80' : 'text-slate-400'}"><i class="fa-solid fa-circle-user mr-1 text-[8px]"></i>${art.author}</span>
        `;
        
        item.onclick = () => {
          stopAutoPlay();
          loadArt(index);
          closeMobileSidebar();
        };
        playlistContainer.appendChild(item);
      });
    }

    function loadArt(index) {
      if (playlist.length === 0) return;
      currentIndex = index;
      const art = playlist[index];
      
      renderPlaylistUI();
      
      // Hide info card momentarily
      artInfoPanel.classList.remove('translate-y-0', 'opacity-100');
      artInfoPanel.classList.add('translate-y-2', 'opacity-0');
      
      // Load and apply iframe securely using srcdoc to bypass Blob URL security policies
      galleryLoader.classList.remove('opacity-0');
      loadingTitle.textContent = art.title;
      
      try {
        iframeExhibition.srcdoc = art.code;
      } catch(e) {
        console.error("Frame compilation error", e);
      }

      setTimeout(() => {
        galleryLoader.classList.add('opacity-0');
        
        titleEl.textContent = art.title;
        authorEl.innerHTML = `<i class="fa-solid fa-user text-indigo-400 text-[8px]"></i> <span>제작: ${art.author}</span>`;
        
        setTimeout(() => {
          artInfoPanel.classList.remove('translate-y-2', 'opacity-0');
          artInfoPanel.classList.add('translate-y-0', 'opacity-100');
        }, 100);

      }, 400);

      // Clean timeline update
      progressBar.classList.remove('animate-progress');
      void progressBar.offsetWidth; // Force Reflow
      
      if(autoPlay && playlist.length > 1) {
        progressBar.style.animationDuration = `${PLAY_DURATION}ms`;
        progressBar.classList.add('animate-progress');
      } else {
        progressBar.style.width = '0%';
      }
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      if (playlist.length <= 1) return;
      
      timerInterval = setInterval(() => {
        let nextIndex = (currentIndex + 1) % playlist.length;
        loadArt(nextIndex);
      }, PLAY_DURATION);
    }

    function toggleAutoPlay() {
      autoPlay = !autoPlay;
      if (autoPlay) {
        iconPlayPause.classList.replace('fa-play', 'fa-pause');
        btnTogglePlay.classList.add('bg-indigo-600');
        btnTogglePlay.classList.remove('bg-slate-100', 'text-slate-600');
        progressBar.style.animationPlayState = 'running';
        loadArt(currentIndex);
        startTimer();
      } else {
        stopAutoPlay();
      }
    }

    function stopAutoPlay() {
      autoPlay = false;
      iconPlayPause.classList.replace('fa-pause', 'fa-play');
      btnTogglePlay.classList.remove('bg-indigo-600');
      btnTogglePlay.classList.add('bg-slate-100', 'text-slate-600');
      progressBar.style.animationPlayState = 'paused';
      progressBar.classList.remove('animate-progress');
      progressBar.style.width = '0%';
      clearInterval(timerInterval);
    }

    selectSpeed.addEventListener('change', (e) => {
      PLAY_DURATION = parseInt(e.target.value);
      timerDisplay.textContent = `${PLAY_DURATION/1000}초 간격 전환`;
      if (autoPlay) {
        loadArt(currentIndex);
        startTimer();
      }
    });

    btnTogglePlay.addEventListener('click', toggleAutoPlay);
    btnNext.addEventListener('click', () => { stopAutoPlay(); loadArt((currentIndex + 1) % playlist.length); });
    btnPrev.addEventListener('click', () => { stopAutoPlay(); loadArt((currentIndex - 1 + playlist.length) % playlist.length); });
    
    touchLeft.addEventListener('click', () => { stopAutoPlay(); loadArt((currentIndex - 1 + playlist.length) % playlist.length); });
    touchRight.addEventListener('click', () => { stopAutoPlay(); loadArt((currentIndex + 1) % playlist.length); });

    // Projection Mode (Minimal View)
    function toggleProjectionMode(active) {
      isProjectionMode = active;
      if (isProjectionMode) {
        sidebarPanel.classList.add('hidden');
        sidebarPanel.classList.remove('flex');
        btnExitProjection.classList.remove('hidden');
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        sidebarPanel.classList.remove('hidden');
        sidebarPanel.classList.add('flex');
        btnExitProjection.classList.add('hidden');
        if (document.fullscreenElement) {
          document.exitFullscreen().catch(() => {});
        }
      }
    }

    btnProjectionMode.addEventListener('click', () => toggleProjectionMode(true));
    btnExitProjection.addEventListener('click', () => toggleProjectionMode(false));
    
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement && isProjectionMode) {
        toggleProjectionMode(false);
      }
    });

    // Mobile Navigation Drawer
    function openMobileSidebar() {
      sidebarPanel.classList.remove('-translate-x-full');
      sidebarBackdrop.classList.remove('hidden');
    }
    
    function closeMobileSidebar() {
      sidebarPanel.classList.add('-translate-x-full');
      sidebarBackdrop.classList.add('hidden');
    }

    btnMobileToggle.addEventListener('click', openMobileSidebar);
    sidebarBackdrop.addEventListener('click', closeMobileSidebar);

    function openStudio() {
      studioModal.classList.remove('hidden');
      studioModal.classList.add('flex');
      if (!codeEditor.value) {
        loadTemplateIntoEditor();
      }
      stopAutoPlay();
    }
    
    function closeStudio() {
      studioModal.classList.add('hidden');
      studioModal.classList.remove('flex');
    }

    btnOpenStudio.addEventListener('click', openStudio);
    btnCloseStudio.addEventListener('click', closeStudio);

    function loadTemplateIntoEditor() {
      codeEditor.value = baseBoilerplate;
      inputTitle.value = "우리 반 미디어 아트 " + (playlist.length === 1 && playlist[0].id === 'guide-page' ? 1 : playlist.length + 1);
      inputAuthor.value = "학생 작가";
      renderStudioPreview();
    }

    btnResetEditor.addEventListener('click', () => {
      loadTemplateIntoEditor();
      showToast('도화지 초기화', '새로운 인터랙티브 스케치 판이 완성되었습니다.');
    });

    let debounceTimer;
    codeEditor.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(renderStudioPreview, 300);
      shareResult.classList.add('hidden');
      shareResult.classList.remove('flex');
    });

    function renderStudioPreview() {
      const code = codeEditor.value;
      try {
        studioIframe.srcdoc = code;
      } catch (e) {
        console.error("Studio rendering error", e);
      }
    }

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleFileUpload(e.target.files[0]);
    });

    function handleFileUpload(file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        codeEditor.value = event.target.result;
        renderStudioPreview();
        inputTitle.value = file.name.replace(/\.[^/.]+$/, "");
        showToast('가져오기 완료', `'${file.name}' 도면을 불러왔습니다.`, 'success');
      };
      reader.readAsText(file);
    }

    btnGenerateShare.addEventListener('click', () => {
      const code = codeEditor.value.trim();
      const title = inputTitle.value.trim() || '무제';
      const author = inputAuthor.value.trim() || '익명 작가';
      
      if (!code) return showToast('가져오기 오류', '작성된 소스가 없습니다.', 'error');

      try {
        const payload = JSON.stringify({ t: title, a: author, c: code });
        const compressed = LZString.compressToEncodedURIComponent(payload);
        const finalUrl = `${window.location.origin}${window.location.pathname}?art=${compressed}`;
        
        shareUrlInput.value = finalUrl;
        shareResult.classList.remove('hidden');
        shareResult.classList.add('flex');
        showToast('주소 변환 성공', '공유를 통해 감상 가능한 복사용 코드가 구성되었습니다.', 'success');
      } catch(e) {
        showToast('크기 오류', '용량이 너무 큰 소스 코드입니다.', 'error');
      }
    });

    btnCopyLink.addEventListener('click', () => {
      shareUrlInput.select();
      document.execCommand('copy');
      btnCopyLink.textContent = '완료!';
      btnCopyLink.classList.replace('bg-slate-900', 'bg-emerald-600');
      showToast('복사 완료', '클립보드에 미술관 감상용 주소가 등록되었습니다.', 'success');
      setTimeout(() => {
        btnCopyLink.textContent = '복사';
        btnCopyLink.classList.replace('bg-emerald-600', 'bg-slate-900');
      }, 1500);
    });

    btnAddToGallery.addEventListener('click', () => {
      const newArt = {
        id: 'art-custom-' + Date.now(),
        title: inputTitle.value.trim() || '우리 반 미디어 아트',
        author: inputAuthor.value.trim() || '작가 학생',
        code: codeEditor.value
      };
      
      if (playlist.length === 1 && playlist[0].id === 'guide-page') {
        playlist = [newArt];
      } else {
        playlist.unshift(newArt);
      }
      
      closeStudio();
      loadArt(0);
      if (playlist.length > 1) {
        startTimer();
      }
      showToast('작품 가입 성공', `'${newArt.title}'이 임시 전시 테이블에 올라갔습니다.`, 'success');
    });

    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const artParam = urlParams.get('art');

      if (artParam) {
        try {
          const decompressed = LZString.decompressFromEncodedURIComponent(artParam);
          const parsed = JSON.parse(decompressed);
          
          if (parsed && parsed.c) {
            const sharedArt = {
              id: 'art-shared',
              title: parsed.t || '공유 수신 작품',
              author: parsed.a || '학생 작가',
              code: parsed.c
            };
            playlist = [sharedArt];
            showToast('공유 예술 접수', `'${sharedArt.author}' 님의 미디어 아트를 전시합니다.`, 'success');
          }
        } catch (err) {
          console.error(err);
          showToast('불러오기 오류', '손상되었거나 빈 코드 수신 데이터입니다.', 'error');
        }
      }

      loadArt(0);
      if (playlist.length > 1) {
        startTimer();
      }
    };
  </script>
</body>
</html>
